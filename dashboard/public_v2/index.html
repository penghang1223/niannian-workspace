<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多角色 AI 助理 Dashboard v2 - 囡囡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header h1 { color: #667eea; font-size: 32px; margin-bottom: 10px; }
        .header .emoji { font-size: 40px; margin-right: 10px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .stat-card .label { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-card .value { font-size: 36px; font-weight: bold; color: #667eea; }
        .section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .section h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .user-list { list-style: none; }
        .user-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        .user-item:hover {
            background: #f5f5f5;
            transform: translateX(5px);
        }
        .user-item .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin-right: 15px;
        }
        .user-item .info { flex: 1; }
        .user-item .name { font-weight: bold; font-size: 16px; color: #333; }
        .user-item .id { font-size: 12px; color: #999; font-family: monospace; }
        .user-item .stats {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .user-item .status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status.active { background: #4caf50; color: white; }
        .status.pending { background: #ff9800; color: white; }
        .status.limited { background: #f44336; color: white; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            margin: 2px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-success { background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); }
        .btn-warning { background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%); }
        .btn-danger { background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); }
        .btn-small { padding: 5px 10px; font-size: 11px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .form-inline { display: flex; gap: 10px; align-items: center; }
        .form-inline input { width: 100px; }
        .pairing-item {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .pairing-item .code {
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            color: #856404;
        }
        .loading { text-align: center; padding: 40px; color: #667eea; font-size: 18px; }
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .rate-limit-badge {
            display: inline-block;
            padding: 3px 8px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 10px;
            font-size: 11px;
            margin-right: 5px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .usage-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            margin: 5px 0;
            overflow: hidden;
        }
        .usage-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #ff9800, #f44336);
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><span class="emoji">🎭</span>多角色 AI 助理 Dashboard <span style="font-size: 16px; color: #999;">v2</span></h1>
            <p style="color: #666; margin-top: 10px;">囡囡的多角色管理系统 - 带调用限制</p>
        </div>
        
        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="label">内测用户</div>
                <div class="value" id="betaUsersCount">-</div>
            </div>
            <div class="stat-card">
                <div class="label">活跃会话</div>
                <div class="value" id="activeSessions">-</div>
            </div>
            <div class="stat-card">
                <div class="label">总消息数</div>
                <div class="value" id="totalMessages">-</div>
            </div>
            <div class="stat-card">
                <div class="label">配对请求</div>
                <div class="value" id="pairingRequests">-</div>
            </div>
        </div>
        
        <!-- Pairing Requests -->
        <div class="section">
            <h2>⏳ 配对请求</h2>
            <div id="pairingList">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- Beta Users -->
        <div class="section">
            <h2>👥 内测用户管理</h2>
            <div class="form-group" style="margin-top: 20px;">
                <label>添加新用户（可设置调用限制）</label>
                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; align-items: center;">
                    <input type="text" id="newUserId" placeholder="用户 ID (ou_xxx)">
                    <input type="number" id="dailyLimitInput" placeholder="每日限制" value="200">
                    <input type="number" id="hourlyLimitInput" placeholder="每小时限制" value="30">
                    <input type="number" id="perMinuteLimitInput" placeholder="每分钟限制" value="8">
                    <button class="btn" onclick="addBetaUserWithLimit()">添加</button>
                </div>
                <div style="margin-top: 10px; color: #666; font-size: 12px;">
                    💡 提示：设置限制可以防止用户滥用，默认内测用户限制为每日 200 次
                </div>
            </div>
            <ul class="user-list" id="betaUserList">
                <div class="loading">加载中...</div>
            </ul>
        </div>
    </div>
    
    <!-- Rate Limit Modal -->
    <div class="modal" id="rateLimitModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚙️ 设置调用限制</h3>
                <button class="modal-close" onclick="closeModal('rateLimitModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>用户 ID</label>
                <input type="text" id="rateLimitUserId" readonly style="background: #f5f5f5;">
            </div>
            <div class="form-group">
                <label>每日限制</label>
                <div class="form-inline">
                    <input type="number" id="dailyLimit" placeholder="100">
                    <span>次/天</span>
                </div>
            </div>
            <div class="form-group">
                <label>每小时限制</label>
                <div class="form-inline">
                    <input type="number" id="hourlyLimit" placeholder="20">
                    <span>次/小时</span>
                </div>
            </div>
            <div class="form-group">
                <label>每分钟限制</label>
                <div class="form-inline">
                    <input type="number" id="perMinuteLimit" placeholder="5">
                    <span>次/分钟</span>
                </div>
            </div>
            <div style="text-align: right; margin-top: 20px;">
                <button class="btn" onclick="closeModal('rateLimitModal')">取消</button>
                <button class="btn btn-success" onclick="saveRateLimit()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- Refresh Button -->
    <button class="btn refresh-btn" onclick="loadData()" title="刷新">🔄</button>
    
    <script>
        const API_BASE = '';
        let currentUserId = null;
        
        async function loadData() {
            await loadStatus();
            await loadPairingRequests();
            await loadBetaUsers();
        }
        
        async function loadStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/status`);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('betaUsersCount').textContent = data.data.betaUsers;
                    document.getElementById('activeSessions').textContent = data.data.activeSessions;
                    document.getElementById('totalMessages').textContent = data.data.totalMessages;
                }
            } catch (error) {
                console.error('加载状态失败:', error);
            }
        }
        
        async function loadPairingRequests() {
            try {
                const res = await fetch(`${API_BASE}/api/pairing-requests`);
                const data = await res.json();
                const container = document.getElementById('pairingList');
                if (data.success && data.data.length > 0) {
                    document.getElementById('pairingRequests').textContent = data.data.length;
                    container.innerHTML = data.data.map(request => `
                        <div class="pairing-item">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <div style="font-weight: bold; margin-bottom: 5px;">👤 ${request.meta?.name || '未知用户'}</div>
                                    <div class="code">配对码：${request.code}</div>
                                    <div style="font-size: 12px; color: #666; margin-top: 5px;">用户 ID: ${request.id}</div>
                                    <div style="font-size: 12px; color: #666;">请求时间：${new Date(request.createdAt).toLocaleString('zh-CN')}</div>
                                </div>
                                <button class="btn btn-success" onclick="approvePairing('${request.id}', '${request.code}')">✅ 批准</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('pairingRequests').textContent = '0';
                    container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无配对请求</div>';
                }
            } catch (error) {
                document.getElementById('pairingList').innerHTML = '<div style="color: red;">加载失败</div>';
            }
        }
        
        async function approvePairing(userId, code) {
            try {
                const res = await fetch(`${API_BASE}/api/pairing/approve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, code })
                });
                const data = await res.json();
                if (data.success) {
                    alert('✅ 配对已批准！');
                    loadData();
                } else {
                    alert('❌ 批准失败：' + data.error);
                }
            } catch (error) {
                alert('批准失败：' + error.message);
            }
        }
        
        async function loadBetaUsers() {
            try {
                const res = await fetch(`${API_BASE}/api/beta-users`);
                const data = await res.json();
                const container = document.getElementById('betaUserList');
                if (data.success) {
                    container.innerHTML = data.data.map(user => {
                        const usage = user.usage || {};
                        const limits = user.limits || {};
                        const dailyPercent = limits.daily ? (usage.daily / limits.daily * 100) : 0;
                        
                        return `
                            <li class="user-item">
                                <div class="avatar">👤</div>
                                <div class="info">
                                    <div class="name">${user.config?.profile?.user_name || user.config?.user_profile?.name || '未知'}</div>
                                    <div class="id">${user.userId}</div>
                                    <div class="stats">
                                        <div>
                                            <div>📊 今日：${usage.daily || 0}/${limits.daily || '-'}</div>
                                            <div class="usage-bar"><div class="usage-bar-fill" style="width: ${Math.min(dailyPercent, 100)}%"></div></div>
                                        </div>
                                        <div>
                                            <div>⏰ 小时：${usage.hourly || 0}/${limits.hourly || '-'}</div>
                                        </div>
                                        <div>
                                            <div>⚡ 分钟：${usage.perMinute || 0}/${limits.perMinute || '-'}</div>
                                        </div>
                                    </div>
                                    <div style="margin-top: 5px;">
                                        <span class="rate-limit-badge">每日：${limits.daily || '-'}</span>
                                        <span class="rate-limit-badge">小时：${limits.hourly || '-'}</span>
                                        <span class="rate-limit-badge">分钟：${limits.perMinute || '-'}</span>
                                    </div>
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 5px;">
                                    <span class="status ${user.isActivated ? 'active' : 'pending'}">
                                        ${user.isActivated ? '✅ 已激活' : '⏳ 待激活'}
                                    </span>
                                    <button class="btn btn-small" onclick="openRateLimitModal('${user.userId}')">⚙️ 限制</button>
                                    <button class="btn btn-small btn-warning" onclick="resetUsage('${user.userId}')">🔄 重置</button>
                                </div>
                            </li>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<div style="color: red;">加载失败</div>';
                }
            } catch (error) {
                document.getElementById('betaUserList').innerHTML = '<div style="color: red;">加载失败</div>';
            }
        }
        
        function openRateLimitModal(userId) {
            currentUserId = userId;
            document.getElementById('rateLimitUserId').value = userId;
            document.getElementById('rateLimitModal').classList.add('show');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }
        
        async function saveRateLimit() {
            const daily = document.getElementById('dailyLimit').value;
            const hourly = document.getElementById('hourlyLimit').value;
            const perMinute = document.getElementById('perMinuteLimit').value;
            
            if (!daily && !hourly && !perMinute) {
                alert('请至少设置一个限制');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/api/users/${currentUserId}/rate-limit`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Operator-ID': 'ou_a0406c4f0dd910da73bb748272663b95' // 管理员 ID
                    },
                    body: JSON.stringify({ daily, hourly, perMinute })
                });
                const data = await res.json();
                if (data.success) {
                    alert('✅ 限制已设置');
                    closeModal('rateLimitModal');
                    loadData();
                } else {
                    if (data.error && data.error.includes('权限不足')) {
                        alert('❌ 权限不足：只有管理员可以修改调用限制');
                    } else {
                        alert('❌ 设置失败：' + data.error);
                    }
                }
            } catch (error) {
                alert('设置失败：' + error.message);
            }
        }
        
        async function resetUsage(userId) {
            if (!confirm('确定要重置该用户的调用统计吗？')) return;
            
            try {
                const res = await fetch(`${API_BASE}/api/users/${userId}/reset-usage`, {
                    method: 'POST',
                    headers: {
                        'X-Operator-ID': 'ou_a0406c4f0dd910da73bb748272663b95' // 管理员 ID
                    }
                });
                const data = await res.json();
                if (data.success) {
                    alert('✅ 统计已重置');
                    loadData();
                } else {
                    if (data.error && data.error.includes('权限不足')) {
                        alert('❌ 权限不足：只有管理员可以重置其他用户的统计');
                    } else {
                        alert('❌ 重置失败：' + data.error);
                    }
                }
            } catch (error) {
                alert('重置失败：' + error.message);
            }
        }
        
        async function addBetaUser() {
            const userId = document.getElementById('newUserId').value.trim();
            if (!userId) {
                alert('请输入用户 ID');
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/api/beta-users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                const data = await res.json();
                if (data.success) {
                    alert('✅ 添加成功！');
                    document.getElementById('newUserId').value = '';
                    loadData();
                } else {
                    alert('❌ 添加失败：' + data.message);
                }
            } catch (error) {
                alert('添加失败：' + error.message);
            }
        }
        
        async function addBetaUserWithLimit() {
            const userId = document.getElementById('newUserId').value.trim();
            const daily = document.getElementById('dailyLimitInput').value;
            const hourly = document.getElementById('hourlyLimitInput').value;
            const perMinute = document.getElementById('perMinuteLimitInput').value;
            
            if (!userId) {
                alert('请输入用户 ID');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/api/beta-users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId,
                        daily: daily ? parseInt(daily) : undefined,
                        hourly: hourly ? parseInt(hourly) : undefined,
                        perMinute: perMinute ? parseInt(perMinute) : undefined
                    })
                });
                const data = await res.json();
                if (data.success) {
                    let message = '✅ 添加成功！';
                    if (data.data.limits) {
                        message += `\n已设置调用限制：\n每日：${data.data.limits.daily || '-'}次\n每小时：${data.data.limits.hourly || '-'}次\n每分钟：${data.data.limits.perMinute || '-'}次`;
                    }
                    alert(message);
                    document.getElementById('newUserId').value = '';
                    loadData();
                } else {
                    alert('❌ 添加失败：' + data.message);
                }
            } catch (error) {
                alert('添加失败：' + error.message);
            }
        }
        
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
